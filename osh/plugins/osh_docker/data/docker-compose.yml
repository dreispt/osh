services:
  odoo:
    image: __IMAGE__
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: myodoo
      PORT: 5432
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ..:/mnt/extra-addons
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: myodoo
      POSTGRES_DB: postgres
    volumes:
      - odoo-db-data:/var/lib/postgresql/data

volumes:
  odoo-web-data:
  odoo-db-data:
